# Nginx configuration for AutoSME (HTTPS termination)
# Place in /etc/nginx/sites-available/autosme and symlink to sites-enabled.
# Adjust server_name and SSL certificate paths.

upstream autosme_api {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name api.autosme.io;  # change to your domain
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.autosme.io;  # change to your domain

    ssl_certificate /etc/letsencrypt/live/api.autosme.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.autosme.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://autosme_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
