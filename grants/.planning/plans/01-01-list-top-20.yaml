# Global Grants — Open to All (No Geographic Restriction)

**Eligibility:** You can apply from Nigeria or anywhere. Most require:
- Legal entity (sole proprietorship, LLC, or org)
- Bank account (international wire)
- CV/biosketch (you)
- Project proposal + budget
- Open-source license for code (usually MIT/Apache)

---

## 1. Ethereum Foundation Grants (ESP)

- **Amount:** $5k–$100k+ (varies)
- **Deadline:** Rolling RFPs; check ESP wishlist
- **Fit:** Open-source AI/automation tools (agent-core qualifies)
- **Notes:** No open calls currently; they use RFPs. Monitor https://esp.ethereum.foundation
- **Application:** Respond to specific RFPs or wait for open window

## 2. Gitcoin Grants (Q1/Q3 rounds)

- **Amount:** $1k–$50k (matching pool)
- **Deadline:** Quarterly (Mar, Jun, Sep, Dec)
- **Fit:** Any open-source project
- **Notes:** Community-driven matching; you need to build a grant page and promote
- **Application:** https://grantworks.gitcoin.co

## 3. Google.org Impact Challenge: AI for Science

- **Amount:** $500k–$3M
- **Deadline:** April 17, 2026
- **Fit:** AI for health/climate breakthroughs
- **Notes:** Must be nonprofit or academic; but you can partner with a university
- **Application:** https://www.google.org/impact-challenges/ai-science/

## 4. Mozilla Creative AI Futures Grants

- **Amount:** $25k–$50k
- **Deadline:** 2025/2026 (watch for next call)
- **Fit:** Creative AI, trustworthy AI, open source
- **Notes:** Requires open-source license
- **Application:** Mozilla Foundation grants page

## 5. Mozilla Technology Fund

- **Amount:** $25k–$100k
- **Deadline:** Periodic; check website
- **Fit:** Open-source tech at intersection of environmental justice & AI
- **Application:** Mozilla OSS Support

## 6. Mozilla AI & Democracy Awards

- **Amount:** $50k + possible $250k scale-up
- **Deadline:** Applications open early 2026
- **Fit:** AI tools for democratic resilience
- **Notes:** Two-year program
- **Application:** Mozilla Incubator

## 7. Cooperative AI Foundation Research Grants

- **Amount:** $20k–$100k
- **Deadline:** Watch for 2025/2026 rounds
- **Fit:** Cooperative AI research (multi-agent systems!)
- **Notes:** Open globally; academic & non‑academic
- **Application:** https://cooperativeai.com/grants

## 8. Google Summer of Code (GSoC)

- **Amount:** $1.5k–$3k per student project
- **Deadline:** Mar–Apr (org apps), Apr–May (student apps)
- **Fit:** Open-source projects; you can be a mentoring org
- **Notes:** Not a direct grant to you, but you can get paid to mentor students working on your repos
- **Application:** https://summerofcode.withgoogle.com

## 9. Outreachy

- **Amount:** $6.5k (stipend for intern) + $500 org admin
- **Deadline:** Aug–Jan cycles
- **Fit:** Open-source internships; you host interns
- **Notes:** Similar to GSoC, focuses on underrepresented groups
- **Application:** https://www.outreachy.org

## 10. Fast Grants (AI & Climate, etc.)

- **Amount:** $10k–$25k
- **Deadline:** Varies (e.g., Cornell AI & Climate: Sep 29, 2025)
- **Fit:** AI research with impact
- **Application:** Specific calls from universities/foundations

## 11. F5 STEM Education and AI Grants

- **Amount:** $50k
- **Deadline:** Mar 1–15, 2025 (annual)
- **Fit:** AI education for women/girls of color
- **Notes:** For nonprofits; could partner with NGO
- **Application:** F5 Foundation

## 12. Tony Elumelu Foundation Entrepreneurship Programme

- **Amount:** $5k seed capital + training
- **Deadline:** Jan 1 – Mar 1, 2025 (annual)
- **Fit:** African entrepreneurs with scalable business ideas
- **Notes:** You (Nigeria) are eligible! Open to AI/tech startups
- **Application:** https://tonyelumelufoundation.org/tef-entrepreneurship-programme

## 13. Mastercard Foundation Grants

- **Amount:** $50k–$500k+
- **Deadline:** Rolling calls
- **Fit:** Youth employment, digital skills, AI training
- **Notes:** Often through NGOs; you can apply as a social enterprise
- **Application:** Watch Mastercard Foundation opportunities

## 14. Gitcoin Matching Funds (P community)

- **Amount:** Variable
- **Deadline:** Ongoing rounds
- **Fit:** Open-source maintainers; you can request matching for donations to your repos
- **Application:** Gitcoin Grants platform

## 15. Protocol Labs (RFP occasional)

- **Amount:** $25k–$100k
- **Deadline:** RFPs as needed (currently paused but watch)
- **Fit:** Decentralized storage, IPFS, libp2p, AI integration
- **Notes:** Check https://research.protocol.ai for active RFPs

## 16. Algorand Foundation Grants

- **Amount:** Up to $100k
- **Deadline:** Rolling
- **Fit:** Build on Algorand blockchain; AI/automation projects
- **Application:** Algorand Foundation grants portal

## 17. Solana Foundation Grants

- **Amount:** Up to $100k
- **Deadline:** Rolling
- **Fit:** Solana ecosystem tools; can include AI agents
- **Application:** Solana Foundation grants

## 18. Ocean Protocol Grants

- **Amount:** $10k–$50k
- **Deadline:** Ongoing
- **Fit:** Data economy, AI + blockchain, open-source tools
- **Application:** Ocean Protocol community grants

## 19. Samsung NEXT

- **Amount:** $50k–$200k
- **Deadline:** Rolling
- **Fit:** Open-source software with commercial potential
- **Notes:** Global, but selective
- **Application:** Samsung NEXT website

## 20. AWS Imagine Grant

- **Amount:** $25k–$100k (AWS credits + cash)
- **Deadline:** Periodic (spring/fall)
- **Fit:** Nonprofits using AWS; can partner with nonprofit
- **Application:** AWS Imagine Grant portal

## 21. Rockefeller Foundation

- **Amount:** $100k+
- **Deadline:** Various calls
- **Fit:** AI for social good, climate, health
- **Notes:** Usually through NGOs or academic partnerships
- **Application:** Rockefeller Foundation funding opportunities

## 22. Ford Foundation

- **Amount:** $50k–$200k
- **Deadline:** Rolling
- **Fit:** Technology for justice, equity, open source
- **Application:** Ford Foundation grantseekers

